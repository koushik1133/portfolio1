<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Koushik Goud Shaganti</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs" type="module"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root[data-theme="dark"] {
            --bg: #000000;
            --text: #ffffff;
            --text-muted: #a1a1aa;
            --text-dim: #71717a;
            --border: #1e1e1e;
            --card-bg: #0a0a0a;
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --btn2-border: #2a2a2a;
            --btn2-text: #a1a1aa;
            --grid-dot: rgba(255, 255, 255, 0.035);
        }

        :root[data-theme="light"] {
            --bg: #ffffff;
            --text: #09090b;
            --text-muted: #52525b;
            --text-dim: #a1a1aa;
            --border: #e4e4e7;
            --card-bg: #fafafa;
            --btn-bg: #09090b;
            --btn-text: #ffffff;
            --btn2-border: #e4e4e7;
            --btn2-text: #52525b;
            --grid-dot: rgba(0, 0, 0, 0.04);
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.3s ease;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: radial-gradient(circle, var(--grid-dot) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
        }

        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 560px;
        }

        .lottie-wrapper {
            width: 280px;
            height: 280px;
            margin: 0 auto 32px;
            position: relative;
        }

        .lottie-wrapper::before {
            content: '';
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .lottie-wrapper dotlottie-player {
            width: 100%;
            height: 100%;
        }

        .error-code {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            letter-spacing: -4px;
            line-height: 1;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .error-title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            color: var(--text);
        }

        .error-desc {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 36px;
        }

        .actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--btn-bg);
            color: var(--btn-text);
        }

        .btn-primary:hover {
            opacity: 0.88;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--btn2-text);
            border: 1.5px solid var(--btn2-border);
        }

        .btn-secondary:hover {
            color: var(--text);
            border-color: var(--text-muted);
        }

        .footer-note {
            margin-top: 64px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .footer-note a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            transition: color 0.2s;
        }

        .footer-note a:hover {
            color: var(--text);
        }

        @media (max-width: 480px) {
            .lottie-wrapper {
                width: 200px;
                height: 200px;
            }
            .actions {
                flex-direction: column;
                align-items: stretch;
            }
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="container">
        <div class="lottie-wrapper">
            <dotlottie-player 
                src="https://assets-v2.lottiefiles.com/a/05fe782a-1185-11ee-b4a1-377ad5371ff2/eFJr9kWegJ.lottie"
                background="transparent"
                speed="1"
                loop
                autoplay>
            </dotlottie-player>
        </div>
        <div class="error-code">404</div>
        <h1 class="error-title">Lost in space.</h1>
        <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <div class="actions">
            <a href="/" class="btn btn-primary">← Back to Home</a>
            <a href="mailto:koushik9924@gmail.com" class="btn btn-secondary">Contact Me</a>
        </div>
        <p class="footer-note">Looking for something specific? <a href="/">Browse the portfolio</a></p>
    </div>

    <script>
        const theme = localStorage.getItem('portfolio-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
    </script>
</body>
</html>
