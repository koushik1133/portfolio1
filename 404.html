<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Koushik Goud Shaganti</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs" type="module"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root[data-theme="dark"] {
            --bg: #000000;
            --text: #ffffff;
            --text-muted: #a1a1aa;
            --text-dim: #71717a;
            --border: #1e1e1e;
            --card-bg: #0a0a0a;
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --btn2-border: #2a2a2a;
            --btn2-text: #a1a1aa;
            --grid-dot: rgba(255, 255, 255, 0.035);
        }

        :root[data-theme="light"] {
            --bg: #ffffff;
            --text: #09090b;
            --text-muted: #52525b;
            --text-dim: #a1a1aa;
            --border: #e4e4e7;
            --card-bg: #fafafa;
            --btn-bg: #09090b;
            --btn-text: #ffffff;
            --btn2-border: #e4e4e7;
            --btn2-text: #52525b;
            --grid-dot: rgba(0, 0, 0, 0.04);
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.3s ease;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: radial-gradient(circle, var(--grid-dot) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
        }

        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 560px;
        }

        .lottie-wrapper {
            width: 280px;
            height: 280px;
            margin: 0 auto 32px;
            position: relative;
        }

        .lottie-wrapper::before {
            content: '';
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .lottie-wrapper dotlottie-player {
            width: 100%;
            height: 100%;
        }

        /* --- Custom Cursor --- */
        *, *::before, *::after {
            cursor: none !important;
        }

        .custom-cursor {
            position: fixed;
            width: 32px;
            height: 32px;
            background-image: url('default_cursor.png');
            background-size: contain;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-5%, -5%);
            transition: transform 0.1s ease-out, width 0.2s ease, height 0.2s ease;
            will-change: left, top;
        }

        .custom-cursor.cursor-hover {
            width: 36px;
            height: 36px;
            background-image: url('hover_pointer.png');
            transform: translate(-5%, -5%) scale(1.1);
        }

        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9990;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, rgba(59, 130, 246, 0.025) 40%, transparent 70%);
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease, background 0.4s ease;
            will-change: left, top;
        }

        .cursor-glow.cursor-hover {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, rgba(59, 130, 246, 0.04) 40%, transparent 70%);
        }

        @media (max-width: 480px) {
            .lottie-wrapper {
                width: 200px;
                height: 200px;
            }
            .actions {
                flex-direction: column;
                align-items: stretch;
            }
            .btn {
                justify-content: center;
            }
            .cursor-glow, .custom-cursor {
                display: none !important;
            }
            *, *::before, *::after {
                cursor: auto !important;
            }
        }
    </style>
</head>
<body>
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="custom-cursor" id="customCursor"></div>
    <div class="bg-grid"></div>
    <div class="container">
        <div class="lottie-wrapper">
            <dotlottie-player 
                src="https://assets-v2.lottiefiles.com/a/05fe782a-1185-11ee-b4a1-377ad5371ff2/eFJr9kWegJ.lottie"
                background="transparent"
                speed="1"
                loop
                autoplay>
            </dotlottie-player>
        </div>
        <div class="error-code">404</div>
        <h1 class="error-title">Lost in space.</h1>
        <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <div class="actions">
            <a href="/" class="btn btn-primary">← Back to Home</a>
            <a href="mailto:koushik9924@gmail.com" class="btn btn-secondary">Contact Me</a>
        </div>
        <p class="footer-note">Looking for something specific? <a href="/">Browse the portfolio</a></p>
    </div>

    <script>
        const theme = localStorage.getItem('portfolio-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);

        // Custom Cursor JS
        const cursorGlow = document.getElementById('cursorGlow');
        const customCursor = document.getElementById('customCursor');
        let mouseX = 0, mouseY = 0, glowX = 0, glowY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            customCursor.style.left = mouseX + 'px';
            customCursor.style.top = mouseY + 'px';
        });

        function animateCursor() {
            glowX += (mouseX - glowX) * 0.12;
            glowY += (mouseY - glowY) * 0.12;
            cursorGlow.style.left = glowX + 'px';
            cursorGlow.style.top = glowY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursorGlow.classList.add('cursor-hover');
                customCursor.classList.add('cursor-hover');
            });
            el.addEventListener('mouseleave', () => {
                cursorGlow.classList.remove('cursor-hover');
                customCursor.classList.remove('cursor-hover');
            });
        });

        if ('ontouchstart' in window) {
            cursorGlow.style.display = 'none';
            customCursor.style.display = 'none';
        }
    </script>
</body>
</html>
